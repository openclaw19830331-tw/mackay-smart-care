<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬偕智慧長照 - 技能進化中心</title>
    <style>
        body { background: #0a0e14; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        header { border-bottom: 2px solid #00f2ff; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { color: #00f2ff; margin: 0; }
        .hero { border: 1px solid #00f2ff; padding: 20px; border-radius: 8px; background: #161b22; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 30px 0; }
        .post-card { background: #1c222d; padding: 15px; border-radius: 8px; border-left: 4px solid #00f2ff; }
        .archive { margin-top: 50px; }
        details { background: #161b22; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        summary { cursor: pointer; font-weight: bold; color: #00f2ff; }
        .skill-tree { margin-top: 50px; padding: 20px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>馬偕智慧長照 - 技能進化中心</h1>
            <p>AI 自動化驅動與技術研發基地</p>
        </header>

        <section class="hero" id="top-post">
            <h2>🚀 今日焦點</h2>
            <div id="hero-content">載入中...</div>
        </section>

        <section class="posts-grid" id="daily-posts">
            <!-- 每日 3 篇 -->
        </section>

        <section class="archive">
            <h2>📚 歷史進化紀錄</h2>
            <div id="archive-list"></div>
        </section>

        <section class="skill-tree">
            <h2>🌱 Hermes 技能進化樹</h2>
            <div id="skill-tree-content">
                <p>AI 學習進度監測中...</p>
                <ul>
                    <li>智慧長照實務：85%</li>
                    <li>人工智慧應用：92%</li>
                    <li>馬偕醫專動態：78%</li>
                </ul>
            </div>
        </section>
    </div>
</body>
</html>
