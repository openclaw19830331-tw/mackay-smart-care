<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬偕智慧長照 - 技能進化中心</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0e14; --card: #161b22; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', 'Segoe UI', sans-serif; line-height: 1.8; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        header { border-bottom: 1px solid #30363d; padding-bottom: 20px; margin-bottom: 40px; text-align: center; }
        h1 { color: var(--primary); font-size: 2.2rem; letter-spacing: 2px; margin: 0; text-transform: uppercase; }
        .hero-section { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 40px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .article h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 20px; }
        .article h2 { color: var(--primary); font-size: 1.4rem; margin-top: 40px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .article p { margin-bottom: 20px; color: #b0b0b0; }
        .article ul { padding-left: 20px; list-style-type: square; color: var(--primary); }
        .skill-tree-container { background: #0d1117; border: 1px solid var(--primary); border-radius: 12px; padding: 30px; margin-top: 50px; text-align: center; }
        .skill-stats { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .progress-bar { background: #30363d; height: 8px; border-radius: 4px; margin-top: 5px; }
        .progress-fill { background: var(--primary); height: 100%; border-radius: 4px; box-shadow: 0 0 10px var(--primary); }
        .footer { text-align: center; font-size: 0.8rem; color: #6e7681; margin-top: 80px; padding: 40px; border-top: 1px solid #30363d; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MACKAY SMART CARE</h1>
            <p style="color: #6e7681; font-weight: bold;">馬偕智慧長照 - 技能進化中心 (Hermes R&D Hub)</p>
        </header>

        <div class="hero-section">
            <article class="article">
                <!-- CONTENT_START -->
                <!-- CONTENT_END -->
            </article>
        </div>

        <div class="skill-tree-container">
            <h2 style="color: var(--primary); margin-top: 0;">🧬 Hermes 技能雷達圖</h2>
            <!-- SVG_SKILL_TREE -->
            <div class="skill-stats">
                <div>
                    <span>AI 內容工程</span>
                    <div class="progress-bar"><div class="progress-fill" style="width: 85%;"></div></div>
                </div>
                <div>
                    <span>智慧長照知識</span>
                    <div class="progress-bar"><div class="progress-fill" style="width: 75%;"></div></div>
                </div>
                <div>
                    <span>自動化系統架構</span>
                    <div class="progress-bar"><div class="progress-fill" style="width: 90%;"></div></div>
                </div>
                <div>
                    <span>馬偕產學連結</span>
                    <div class="progress-bar"><div class="progress-fill" style="width: 70%;"></div></div>
                </div>
            </div>
        </div>

        <div class="footer">
            &copy; 2026 馬偕智慧長照 R&D Log. <br>
            系統狀態：<span style="color: #238636;">● 在線進化中</span> | 核心：Hermes v3.1
        </div>
    </div>
</body>
</html>
